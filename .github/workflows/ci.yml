name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api_mindro_learning/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api_mindro_learning/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=database/prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test -- --passWithNoTests --ci

  admin:
    name: Admin Console (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin_console_mindro_learning

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin_console_mindro_learning/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Provide dummy values so the build doesn't fail on missing env vars
          REACT_APP_API_BASE: http://localhost:3000
          REACT_APP_API_BEARER_TOKEN: ci-placeholder

  mobile:
    name: Mobile App (Expo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_mindro_learning

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app_mindro_learning/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Export (web bundle)
        run: npx expo export --platform web
        env:
          API_URL: http://localhost:3000
          API_BEARER_TOKEN: ci-placeholder
          STRIPE_PUBLIC_KEY: pk_test_placeholder

  docker:
    name: Docker Build (API)
    runs-on: ubuntu-latest
    needs: api
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: api_mindro_learning/api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
